="165.6719"/><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="227" x="5" y="181.9688">java -jar plantuml.jar -testdot</text><text fill="#33FF02" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacingAndGlyphs" textLength="0" x="10" y="198.2656"/><!--MD5=[09bda9591e2006d77d5fadcd507b77fd]
@startuml pipeline
skinparam direction left to right
skinparam backgroundColor #FAFAFA
skinparam defaultFontName Arial
skinparam defaultFontSize 14
skinparam ArrowColor #555555
skinparam ArrowThickness 2
skinparam linetype ortho

skinparam rectangle {
    BackgroundColor #EFF6FF
    BorderColor #3B82F6
    FontColor #1E3A8A
    RoundCorner 12
}

skinparam database {
    BackgroundColor #FEF9C3
    BorderColor #EAB308
    FontColor #713F12
}

skinparam usecase {
    BackgroundColor #F0FDF4
    BorderColor #22C55E
    FontColor #14532D
}

package "Indexing — embed.py" #EEF2FF {
    folder "documents/" as docs
    rectangle "chunk_text\n300 words · 50 overlap" as chunk
    rectangle "embed_chunks\nOpenAI API" as embed
    database "embeddings.json" as store

    docs - -> chunk
    chunk - -> embed
    embed - -> store
}

package "Search — search.py" #FDF4FF {
    usecase "Query" as query
    rectangle "embed_query\nOpenAI API" as embedq
    rectangle "cosine_similarity\nvs all chunks" as cosine
    usecase "Top-K Results" as results

    query - -> embedq
    embedq - -> cosine
    cosine - -> results
}

store - -> cosine

@enduml

