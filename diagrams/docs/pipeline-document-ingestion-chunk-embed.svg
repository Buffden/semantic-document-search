yle="stroke: #A80036; stroke-width: 1.0;" x1="674.5" x2="716.5" y1="517.3203" y2="517.3203"/><line style="stroke: #A80036; stroke-width: 1.0;" x1="716.5" x2="716.5" y1="517.3203" y2="530.3203"/><line style="stroke: #A80036; stroke-width: 1.0;" x1="675.5" x2="716.5" y1="530.3203" y2="530.3203"/><polygon fill="#A80036" points="685.5,526.3203,675.5,530.3203,685.5,534.3203,681.5,530.3203" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="289" x="681.5" y="512.2544">build [{"text": chunk, "embedding": [...float]}]</text><polygon fill="#A80036" points="77.5,555.4531,67.5,559.4531,77.5,563.4531,73.5,559.4531" style="stroke: #A80036; stroke-width: 1.0;"/><line style="stroke: #A80036; stroke-width: 1.0; stroke-dasharray: 2.0,2.0;" x1="71.5" x2="668.5" y1="559.4531" y2="559.4531"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="128" x="304" y="554.3872">embedded: list[dict]</text><!--MD5=[a9b107a69a14ce61a010cabc39061a09]
@startuml pipeline-document-ingestion-chunk-embed
skinparam sequenceMessageAlign center
skinparam ParticipantPadding 10

participant "ingest_file()" as ingest
participant "utils\nchunk_text()" as chunker
participant "embed\nembed_chunks()" as embedder
participant "OpenAI\nEmbeddings API" as openai

== Chunking ==

ingest -> chunker : chunk_text(text, chunk_size = 300, overlap = 50)
activate chunker
chunker -> chunker : words = text.split()
chunker -> chunker : step = chunk_size - overlap = 250
loop for i in range(0, len(words), step = 250)
chunker -> chunker : chunk_words = words[i : i + 300]
chunker -> chunker : chunks.append(" ".join(chunk_words))
end
chunker - -> ingest : chunks: list[str]
deactivate chunker

== Embedding ==

ingest -> embedder : embed_chunks(chunks)
activate embedder
embedder -> openai : embeddings.create(model = EMBEDDING_MODEL, input = chunks)
activate openai
openai - -> embedder : EmbeddingResponse — response.data[i].embedding
deactivate openai
embedder -> embedder : build [{"text": chunk, "embedding": [...float]}]
embedder - -> ingest : embedded: list[dict]
deactivate embedder

@enduml

